# Codex stage-to-persona binding layer.
# This file is the persona label source of truth for the shipped Codex adapter.
# It maps workflow stages to concrete Codex persona agents.

version = 1

[[stages]]
name = "idea-create"
[[stages.assignments]]
persona = "Product Strategist"
agent = "product_strategist"

[[stages]]
name = "idea-review"
[[stages.assignments]]
persona = "Stakeholder Advocate"
agent = "stakeholder_advocate"
[[stages.assignments]]
persona = "Product Designer"
agent = "product_designer"
allowed_substitutions = ["Domain Expert"]
[[stages.assignments]]
persona = "Skeptic"
agent = "skeptic"

[[stages]]
name = "spec-create"
[[stages.assignments]]
